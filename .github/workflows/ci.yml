name: CI Pipeline — Talentra

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Code Quality (Lint & Type Check) ──────────────────────────────────────
  quality:
    name: Code Quality (Lint & Types)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Check
        run: npm run lint

      - name: Run TypeScript Type Check
        run: npm run type-check

  # ── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest Unit Tests
        run: npm run test

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Full Production Build ──────────────────────────────────────────────────
  build:
    name: Production Build (Client & Server)
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate CI Environment Configuration
        run: |
          echo "APP_NAME=Talentra" >> .env
          echo "APP_ENV=development" >> .env
          echo "PORT=5000" >> .env
          echo "CLIENT_URL=http://localhost:5173" >> .env
          echo "SERVER_URL=http://localhost:5000" >> .env
          echo "MONGODB_URI=mongodb://localhost:27017/talentra_ci" >> .env
          echo "MONGODB_DB_NAME=talentra_ci" >> .env
          echo "JWT_ACCESS_SECRET=ci-access-secret-32-chars-long-spec!" >> .env
          echo "JWT_REFRESH_SECRET=ci-refresh-secret-32-chars-long-spec!" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "VITE_API_URL=http://localhost:5000" >> .env

      - name: Execute Production Build
        run: npm run build

      - name: Upload Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7

  # ── End-to-End Tests (on PRs) ──────────────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Generate CI Environment Configuration
        run: |
          echo "APP_NAME=Talentra" >> .env
          echo "APP_ENV=development" >> .env
          echo "PORT=5000" >> .env
          echo "CLIENT_URL=http://localhost:5173" >> .env
          echo "SERVER_URL=http://localhost:5000" >> .env
          echo "MONGODB_URI=mongodb://localhost:27017/talentra_ci" >> .env
          echo "MONGODB_DB_NAME=talentra_ci" >> .env
          echo "JWT_ACCESS_SECRET=ci-access-secret-32-chars-long-spec!" >> .env
          echo "JWT_REFRESH_SECRET=ci-refresh-secret-32-chars-long-spec!" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "VITE_API_URL=http://localhost:5000" >> .env

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright Test Report Artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
