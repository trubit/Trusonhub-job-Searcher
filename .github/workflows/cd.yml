name: CD & Docker Build — Talentra

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Container Image Build ──────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker API Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: server-prod
          push: false
          tags: talentra/api:latest,talentra/api:${{ github.sha }}

      - name: Build Docker Client Static Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: client-builder
          push: false
          tags: talentra/client:latest,talentra/client:${{ github.sha }}

  # ── Release Packaging (Tag Release) ──────────────────────────────────────
  release-package:
    name: Release Packaging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Build
        run: npm run build

      - name: Create Release Archive
        run: tar -czvf talentra-release-${{ github.ref_name }}.tar.gz dist/ package.json Dockerfile docker-compose.yml

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: talentra-release-${{ github.ref_name }}
          path: talentra-release-${{ github.ref_name }}.tar.gz
          retention-days: 30
